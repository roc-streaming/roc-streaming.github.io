name: "build"

on:
  push:
    branches:
      - main

  repository_dispatch:
    types:
      - trigger_build

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  build:
    outputs:
      page-url: ${{ steps.upload.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pixi
        uses: roc-streaming/ci/actions/install-pixi@main

      - name: Build
        run: pixi run build

      - if: |
          github.repository_owner == 'roc-streaming' && github.ref == 'refs/heads/main'
        name: Upload
        id: upload
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    if: |
      github.repository_owner == 'roc-streaming' && github.ref == 'refs/heads/main'

    needs: build
    environment:
      name: github-pages
      url: ${{ needs.build.outputs.page-url }}
    permissions:
      pages: write
      id-token: write

    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v5
