<svg width="760" height="900" viewBox="0 0 760 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Roc Cast rooms card</title>
  <desc id="desc">A stylized narrow Roc Cast interface card showing active audio rooms and playback switches.</desc>
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .label { font-size: 24px; font-weight: 450; letter-spacing: .03em; fill: oklch(0.24 0.022 245); }
    .meta { font-size: 21px; font-weight: 450; letter-spacing: .02em; fill: oklch(0.24 0.022 245); }
    .blue { fill: oklch(0.51 0.16 253.51); }
    .room { font-size: 30px; font-weight: 500; letter-spacing: .01em; fill: oklch(0.24 0.022 245); }
    .tiny { font-size: 15px; font-weight: 500; letter-spacing: .08em; fill: oklch(0.24 0.022 245); }
  </style>


  <rect x="28" y="64" width="704" height="772" rx="28" fill="none" stroke="#CCD4DA" stroke-width="2"/>

  <g class="mono">
    <text x="68" y="126" class="label">Roc Cast</text>
    <text x="594" y="126" class="meta blue">3 active</text>
  </g>

  <g class="mono">
    <rect x="68" y="190" width="112" height="40" rx="20" fill="#EAF0F3" stroke="#D0D8DE" stroke-width="1.5"/>
    <text x="95" y="216" class="tiny">ROOMS</text>
    <rect x="195" y="190" width="124" height="40" rx="20" fill="transparent" stroke="#D0D8DE" stroke-width="1.5"/>
    <text x="220" y="216" class="tiny">SOURCES</text>
    <rect x="334" y="190" width="124" height="40" rx="20" fill="transparent" stroke="#D0D8DE" stroke-width="1.5"/>
    <text x="360" y="216" class="tiny">DEVICES</text>
  </g>

  <g>
    <rect x="68" y="259" width="624" height="124" rx="18" fill="#E8F3FA" stroke="#B8D4E6" stroke-width="2"/>
    <text x="102" y="315" class="mono room">Living Room</text>
    <text x="102" y="348" class="mono meta">Soundbar · multi-room</text>
    <rect x="458" y="301" width="126" height="34" rx="17" fill="#EAF4F8"/>
    <rect x="478" y="309" width="4" height="18" rx="2" fill="oklch(0.51 0.16 253.51)"/>
    <rect x="486" y="313" width="4" height="10" rx="2" fill="oklch(0.51 0.16 253.51)"/>
    <rect x="494" y="306" width="4" height="24" rx="2" fill="oklch(0.51 0.16 253.51)"/>
    <text x="511" y="324" class="mono tiny blue">PLAYING</text>
    <rect x="600" y="298" width="74" height="40" rx="20" fill="oklch(0.51 0.16 253.51)"/>
    <circle cx="654" cy="318" r="16" fill="#E8F3FA"/>
  </g>

  <g>
    <rect x="68" y="405" width="624" height="124" rx="18" fill="#E8F3FA" stroke="#B8D4E6" stroke-width="2"/>
    <text x="102" y="461" class="mono room">Studio</text>
    <text x="102" y="494" class="mono meta">Audio I/O · IFB</text>
    <rect x="590" y="444" width="74" height="40" rx="20" fill="oklch(0.51 0.16 253.51)"/>
    <circle cx="644" cy="464" r="16" fill="#E8F3FA"/>
  </g>

  <g>
    <rect x="68" y="551" width="624" height="124" rx="18" fill="#E8F3FA" stroke="#B8D4E6" stroke-width="2"/>
    <text x="102" y="607" class="mono room">Kitchen</text>
    <text x="102" y="640" class="mono meta">Speaker · group A</text>
    <rect x="458" y="593" width="126" height="34" rx="17" fill="#EAF4F8"/>
    <rect x="478" y="601" width="4" height="18" rx="2" fill="oklch(0.51 0.16 253.51)"/>
    <rect x="486" y="605" width="4" height="10" rx="2" fill="oklch(0.51 0.16 253.51)"/>
    <rect x="494" y="598" width="4" height="24" rx="2" fill="oklch(0.51 0.16 253.51)"/>
    <text x="511" y="616" class="mono tiny blue">PLAYING</text>
    <rect x="600" y="590" width="74" height="40" rx="20" fill="oklch(0.51 0.16 253.51)"/>
    <circle cx="654" cy="610" r="16" fill="#E8F3FA"/>
  </g>

  <g>
    <rect x="68" y="697" width="624" height="104" rx="18" fill="#E8F3FA" stroke="#B8D4E6" stroke-width="2"/>
    <text x="102" y="748" class="mono room">Office</text>
    <text x="102" y="781" class="mono meta">Streamer</text>
    <rect x="590" y="729" width="74" height="40" rx="20" fill="#E6EBEE"/>
    <circle cx="610" cy="749" r="16" fill="#E8F3FA" stroke="#B8D4E6" stroke-width="4"/>
  </g>
</svg>