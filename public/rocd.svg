<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="40" y="40" width="1520" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#B7C7D8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#F8FAFC"/>

  <g filter="url(#shadow)">
    <rect x="90" y="80" width="1420" height="700" rx="30" fill="white" stroke="#D8E1EB" stroke-width="2"/>
  </g>

  <!-- Header -->
  <text x="150" y="170" fill="#5C93BA" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="700">GET</text>
  <text x="285" y="170" fill="#1F2937" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="500">/rocd/streams</text>
  <text x="1320" y="170" fill="#5C93BA" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="500">200 OK</text>
  <line x1="90" y1="215" x2="1510" y2="215" stroke="#E3EAF1" stroke-width="2"/>

  <!-- Code block -->
  <g font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="34">
    <text x="150" y="300" fill="#111827">{</text>

    <text x="260" y="365" fill="#555555">"peer"</text>
    <text x="555" y="365" fill="#111827">:</text>
    <text x="620" y="365" fill="#5C93BA">"studio-01"</text>
    <text x="895" y="365" fill="#111827">,</text>

    <text x="260" y="430" fill="#555555">"endpoint"</text>
    <text x="555" y="430" fill="#111827">:</text>
    <text x="620" y="430" fill="#5C93BA">"rtp+rs8m://0.0.0.0:10001"</text>
    <text x="1125" y="430" fill="#111827">,</text>

    <text x="260" y="495" fill="#555555">"device"</text>
    <text x="555" y="495" fill="#111827">:</text>
    <text x="620" y="495" fill="#5C93BA">"virtual-out-3"</text>
    <text x="942" y="495" fill="#111827">,</text>

    <text x="260" y="560" fill="#555555">"latency_ms"</text>
    <text x="555" y="560" fill="#111827">:</text>
    <text x="620" y="560" fill="#5C93BA">60</text>
    <text x="688" y="560" fill="#111827">,</text>

    <text x="260" y="625" fill="#555555">"fec"</text>
    <text x="555" y="625" fill="#111827">:</text>
    <text x="620" y="625" fill="#5C93BA">"rs8m"</text>
    <text x="780" y="625" fill="#111827">,</text>

    <text x="260" y="690" fill="#555555">"metrics"</text>
    <text x="555" y="690" fill="#111827">:</text>
    <text x="620" y="690" fill="#111827">{</text>
    <text x="675" y="690" fill="#555555">"loss"</text>
    <text x="785" y="690" fill="#111827">:</text>
    <text x="835" y="690" fill="#5C93BA">0.4</text>
    <text x="920" y="690" fill="#111827">,</text>
    <text x="965" y="690" fill="#555555">"jitter_ms"</text>
    <text x="1188" y="690" fill="#111827">:</text>
    <text x="1238" y="690" fill="#5C93BA">2.1</text>
    <text x="1310" y="690" fill="#111827">}</text>

    <text x="150" y="745" fill="#111827">}</text>
  </g>

  <!-- Tabs area integrated in same card -->
  <line x1="90" y1="780" x2="1510" y2="780" stroke="#E3EAF1" stroke-width="2"/>
  <g font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#5C93BA">
    <text x="355" y="835">peers</text>
    <text x="758" y="835">streams</text>
    <text x="1140" y="835">devices</text>
  </g>

  <!-- tab guide line -->
  <line x1="260" y1="855" x2="1340" y2="855" stroke="#D7E3EE" stroke-width="2"/>
  <!-- active tab underline -->
  <line x1="720" y1="855" x2="920" y2="855" stroke="#5C93BA" stroke-width="4" stroke-linecap="round"/>
</svg>
